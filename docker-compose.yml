services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-converter-app
    ports:
      - "4444:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
